version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - ./settings.env
    volumes:
      - ./data/bwdata:/data:rw
    networks:
      - bw_net
    depends_on:
      bw_mariadb:
        condition: service_healthy
      bw_redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/alive || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    environment:
      - DATABASE_URL=mysql://${MARIADB_USER}:${MARIADB_PASSWORD}@bw_mariadb:3306/${MARIADB_DATABASE}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@bw_redis:6379

  bw_mariadb:
    image: mariadb:latest
    container_name: bw_mariadb
    restart: unless-stopped
    user: "999:999"  # Security separation - database user
    env_file:
      - ./settings.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - ./data/mariadb:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MARIADB_USER} -p${MARIADB_PASSWORD} --silent || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  bw_redis:
    image: redis:latest
    container_name: bw_redis
    restart: unless-stopped
    user: "999:999"  # Security separation - cache user
    env_file:
      - ./settings.env
    volumes:
      - ./data/redis:/data:rw
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 1m
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  bw_caddy:
    image: caddy:latest
    container_name: bw_caddy
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    env_file:
      - ./settings.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/caddy_logs:/logs
      - ./caddy/cloudflare_ips.caddy:/etc/caddy/cloudflare_ips.caddy:rw
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      vaultwarden:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 https://localhost/health || curl -fsS --max-time 5 http://localhost/health || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  bw_fail2ban:
    image: lscr.io/linuxserver/fail2ban:latest
    container_name: bw_fail2ban
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./fail2ban/jail.d/jail.local:/config/jail.local:ro
      - ./fail2ban/filter.d:/config/filter.d:ro
      - ./caddy/cloudflare_ips.txt:/config/cloudflare_ips.txt:ro
      - ./data/caddy_logs:/logs/caddy:ro
      - ./data/bwdata:/logs/vaultwarden:ro
      - ./data/fail2ban:/config:rw
      - /var/log:/var/log/host:ro
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping >/dev/null 2>&1 || exit 1"]
      interval: 5m
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bw_net
    depends_on:
      bw_caddy:
        condition: service_started
      vaultwarden:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M

  bw_ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: bw_ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./ddclient:/config:rw
    healthcheck:
      test: ["CMD-SHELL", "ddclient -query | grep -q 'address' || exit 1"]
      interval: 10m
      timeout: 15s
      retries: 2
      start_period: 30s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

  bw_backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: bitwarden_backup:latest
    container_name: bw_backup
    env_file:
      - ./settings.env
    volumes:
      - ./data/backups:/backups:rw
      - ./data/backup_logs:/var/log/backup:rw
      - ./data/bwdata:/data:ro
      - ./data/mariadb:/var/lib/mysql:ro
      - ./backup/rclone.conf:/root/.config/rclone/rclone.conf:ro
    entrypoint: ["/usr/sbin/cron", "-f"]
    restart: "unless-stopped"
    networks:
      - bw_net
    depends_on:
      vaultwarden:
        condition: service_healthy
      bw_mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -w /backups && pgrep cron >/dev/null || exit 1"]
      interval: 30m
      timeout: 10s
      retries: 2
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    profiles:
      - backup

  bw_watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    container_name: bw_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE:-0 0 3 * * 0}
      - TZ=${TZ:-UTC}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M

networks:
  bw_net:
    driver: bridge
    name: vaultwarden_network
