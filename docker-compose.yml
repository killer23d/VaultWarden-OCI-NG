version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - ./settings.env
    ports:
      - "8080:80"
    volumes:
      - ./data/bwdata:/data:rw
    networks:
      - bw_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3

  mariadb:
    image: mariadb:latest
    container_name: bw_mariadb
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./data/mariadb:/var/lib/mysql:rw
    environment:
      # Map your variables from settings.env to what the container needs
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MARIADB_ROOT_PASSWORD} >/dev/null 2>&1 || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  redis:
    image: redis:latest
    container_name: bw_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data:rw
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - bw_net

  caddy:
    image: caddy:latest
    container_name: bw_caddy
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/caddy_logs:/logs
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 https://localhost || curl -fsS --max-time 5 http://localhost || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  fail2ban:
    image: lscr.io/linuxserver/fail2ban:latest
    container_name: bw_fail2ban
    restart: unless-stopped
    volumes:
      - ./fail2ban/jail.local:/config/jail.local:ro
      - ./fail2ban/filter.d:/config/filter.d:ro
      - ./data/caddy_logs:/logs/caddy:ro # Mount Caddy logs (read-only)
      - ./data/bwdata:/logs/vaultwarden:ro # Mount Vaultwarden logs (read-only)
      - ./data/fail2ban:/config:rw
      - /var/log:/var/log/host:ro
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping >/dev/null 2>&1 || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: bw_ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./ddclient/ddclient.conf:/config/ddclient.conf:ro
      - ./ddclient/ddclient.log:/config/ddclient.log
    healthcheck:
      test: ["CMD-SHELL", "test -f /config/ddclient.log || exit 1"]
      interval: 5m
      timeout: 10s
      retries: 2
    networks:
      - bw_net

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: bitwarden_backup:latest
    container_name: bw_backup
    env_file:
      - ./settings.env
    volumes:
      - ./data/backups:/backups:rw
      - ./data/backup_logs:/var/log/backup:rw
      - ./data/bwdata:/data:ro
      - ./data/mariadb:/var/lib/mysql:ro
    # Use cron as the entrypoint to run scheduled backups
    entrypoint: ["/usr/sbin/cron", "-f"]
    restart: "unless-stopped" # Keep the container running
    networks:
      - bw_net
    healthcheck:
      test: ["CMD-SHELL", "test -w /backups || exit 1"]
      interval: 30m
      timeout: 10s
      retries: 1

  watchtower:
    # Watchtower will pull down your new image, gracefully shut down your existing container
    # and restart it with the same options that were used when it was deployed initially
    # https://github.com/containrrr/watchtower
    image: containrrr/watchtower
    restart: always
    container_name: watchtower
    depends_on:
      - vaultwarden # Corrected service name
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE
      - TZ

networks:
  bw_net:
    driver: bridge
