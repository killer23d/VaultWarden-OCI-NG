version: "3.8"

services:

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    env_file:
      - ./settings.env
    volumes:
      - ./data/bwdata:/data:rw
    networks:
      - bw_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3

  mariadb:
    image: mariadb:latest
    container_name: bw_mariadb
    restart: unless-stopped
    user: "999:999"
    env_file:
      - ./settings.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - ./data/mariadb:/var/lib/mysql:rw
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p${MARIADB_ROOT_PASSWORD} >/dev/null 2>&1 || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - bw_net

  redis:
    image: redis:latest
    container_name: bw_redis
    restart: unless-stopped
    user: "999:999"
    env_file:
      - ./settings.env
    volumes:
      - ./data/redis:/data:rw
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - bw_net

  caddy:
    image: caddy:latest
    container_name: bw_caddy
    restart: unless-stopped
    user: "${PUID}:${PGID}"
    env_file:
      - ./settings.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/caddy_logs:/logs
      - ./caddy/cloudflare_ips.caddy:/etc/caddy/cloudflare_ips.caddy:ro
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 https://localhost || curl -fsS --max-time 5 http://localhost || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  fail2ban:
  image: lscr.io/linuxserver/fail2ban:latest
  container_name: bw_fail2ban
  restart: unless-stopped
  env_file:
    - ./settings.env
  volumes:
    - ./fail2ban/jail.local:/config/jail.local:ro
    - ./fail2ban/filter.d:/config/filter.d:ro
    - ./caddy/cloudflare_ips.txt:/config/cloudflare_ips.txt:ro
    - ./data/caddy_logs:/logs/caddy:ro
    - ./data/bwdata:/logs/vaultwarden:ro
    - ./data/fail2ban:/config:rw
    - /var/log:/var/log/host:ro
  cap_add:
    - NET_ADMIN
  environment:
    - PUID=${PUID}
    - PGID=${PGID}
  healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping >/dev/null 2>&1 || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
  networks:
      - bw_net
  depends_on:
      caddy:
        condition: service_started
      vaultwarden:
        condition: service_healthy

  ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: bw_ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./ddclient:/config:rw
    healthcheck:
      test: ["CMD-SHELL", "ddclient -query | grep -q 'address'"]
      interval: 5m
      timeout: 10s
      retries: 2
    networks:
      - bw_net

  backup:
  build:
    context: ./backup
    dockerfile: Dockerfile
  image: bitwarden_backup:latest
  container_name: bw_backup
  env_file:
    - ./settings.env
  volumes:
    - ./data/backups:/backups:rw
    - ./data/backup_logs:/var/log/backup:rw
    - ./data/bwdata:/data:ro
    - ./data/mariadb:/var/lib/mysql:ro
    - ./backup/rclone.conf:/root/.config/rclone/rclone.conf:ro
  entrypoint: ["/usr/sbin/cron", "-f"]
  restart: "unless-stopped"
  networks:
    - bw_net
  depends_on:
    vaultwarden:
      condition: service_healthy
    mariadb:
      condition: service_healthy
  healthcheck:
    test: ["CMD-SHELL", "test -w /backups || exit 1"]
    interval: 30m
    timeout: 10s
    retries: 1

  watchtower:
    image: containrrr/watchtower
    restart: always
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE}
      - TZ=${TZ}
    networks:
      - bw_net

networks:
  bw_net:
    driver: bridge
