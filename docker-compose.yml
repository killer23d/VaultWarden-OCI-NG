version: "3.9"

services:
  db:
    image: mariadb:11
    container_name: bitwarden_db
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./mariadb:/var/lib/mysql
    networks:
      - internal

  redis:
    image: redis:7
    container_name: bitwarden_redis
    restart: unless-stopped
    networks:
      - internal

  bitwarden-unified:
    image: bitwarden/self-host:latest
    container_name: bitwarden
    restart: unless-stopped
    env_file:
      - ./settings.env
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    volumes:
      - ./bwdata:/etc/bitwarden
    networks:
      - internal
      - web

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./caddy_data:/data
      - ./caddy_config:/config
    networks:
      - web
      - internal

  ddclient:
    image: ghcr.io/ddclient/ddclient:latest
    container_name: ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    networks:
      - web

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    volumes:
      - ./fail2ban/data:/data
      - /var/log:/var/log:ro
    network_mode: "host"

  backup:
    build: ./backup
    container_name: bitwarden_backup
    depends_on:
      - db
      - bitwarden-unified
    env_file:
      - ./settings.env
    volumes:
      - ./backups:/backups
      - ./bwdata:/etc/bitwarden:ro
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
