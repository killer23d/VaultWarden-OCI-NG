version: "3.9"
services:
  db:
    image: mariadb:11
    container_name: bitwarden_db
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./data/mariadb:/var/lib/mysql
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7
    container_name: bitwarden_redis
    restart: unless-stopped
    command: redis-server --requirepass $REDIS_PASSWORD
    env_file:
      - ./settings.env
    volumes:
      - ./data/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5

  bitwarden-unified:
    image: bitwarden/self-host:latest
    container_name: bitwarden
    restart: unless-stopped
    env_file:
      - ./settings.env
    depends_on:
      - db
      - redis
    volumes:
      - ./data/bwdata:/etc/bitwarden
    networks:
      - internal
      - web
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/alive"]
      interval: 10s
      retries: 5

  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - ./settings.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/caddy_logs:/var/log/caddy
      # For Cloudflare Origin CA
      # - ./caddy/cert.pem:/etc/caddy/cert.pem:ro
      # - ./caddy/key.pem:/etc/caddy/key.pem:ro
    networks:
      - web
      - internal

  ddclient:
    image: ghcr.io/ddclient/ddclient:latest
    container_name: ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./ddclient/ddclient.conf:/etc/ddclient/ddclient.conf:ro
    networks:
      - web

  fail2ban:
    image: crazymax/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    volumes:
      - ./data/fail2ban:/data
      - ./fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - ./data/bwdata/logs:/etc/bitwarden/logs:ro
    network_mode: "host"

  backup:
    build: ./backup
    container_name: bitwarden_backup
    depends_on:
      - db
      - bitwarden-unified
    env_file:
      - ./settings.env
    volumes:
      - ./data/backups:/backups
      - ./data/bwdata:/etc/bitwarden:ro
      - ./backup/msmtprc:/etc/msmtprc:ro
      - ./data/backup_logs:/var/log
    restart: unless-stopped
    networks:
      - internal

networks:
  internal:
    driver: bridge
  web:
    driver: bridge
