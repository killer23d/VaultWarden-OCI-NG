version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ./settings.env
    volumes:
      - ./data/bwdata:/data:rw
    networks:
      - bw_net
    depends_on:
      bw_mariadb:
        condition: service_healthy  # MUST be healthy - VaultWarden cannot start without DB
      bw_redis:
        condition: service_healthy  # MUST be healthy - VaultWarden needs cache
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/alive || exit 1"]
      interval: 2m
      timeout: 15s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@bw_redis:6379
      - ROCKET_WORKERS=${VAULTWARDEN_WORKERS:-2}
      - DATABASE_MAX_CONNS=${DATABASE_MAX_CONNECTIONS:-15}
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        labels: "service=vaultwarden"

  bw_mariadb:
    image: mariadb:11-jammy
    container_name: bw_mariadb
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ./settings.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
      MYSQL_INITDB_SKIP_TZINFO: 1
    volumes:
      - ./data/mariadb:/var/lib/mysql:rw
      - ./config/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=384M
      --innodb-log-file-size=128M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --query-cache-size=0
      --query-cache-type=0
      --max-connections=${DATABASE_MAX_CONNECTIONS:-15}
      --thread-cache-size=8
      --table-open-cache=64
      --key-buffer-size=32M
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MARIADB_USER} -p${MARIADB_PASSWORD} --silent || exit 1"]
      interval: 30s  # Fast for dependency resolution
      timeout: 15s
      retries: 5
      start_period: 120s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
        labels: "service=mariadb"

  bw_redis:
    image: redis:7-alpine
    container_name: bw_redis
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ./settings.env
    volumes:
      - ./data/redis:/data:rw
      - ./config/redis/redis.conf:/etc/redis/redis.conf:ro
    command: ["redis-server", "/etc/redis/redis.conf", "--requirepass", "${REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s  # Fast for dependency resolution
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "2"
        labels: "service=redis"

  bw_caddy:
    image: caddy:2-alpine
    container_name: bw_caddy
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ./settings.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/caddy_logs:/logs
      - ./caddy/cloudflare_ips.caddy:/etc/caddy/cloudflare_ips.caddy:rw
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      vaultwarden:
        condition: service_started  # Relaxed - Caddy will retry connection to VaultWarden
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile && curl -f http://vaultwarden:80/alive || exit 1"]
      interval: 5m
      timeout: 15s
      retries: 3
      start_period: 45s
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
        labels: "service=caddy"

  bw_fail2ban:
    image: lscr.io/linuxserver/fail2ban:latest
    container_name: bw_fail2ban
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./fail2ban/jail.d/jail.local:/config/jail.local:ro
      - ./fail2ban/filter.d:/config/filter.d:ro
      - ./caddy/cloudflare_ips.txt:/config/cloudflare_ips.txt:ro
      - ./data/caddy_logs:/logs/caddy:ro
      - ./data/bwdata:/logs/vaultwarden:ro
      - ./data/fail2ban:/config:rw
      - /var/log:/var/log/host:ro
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - VERBOSITY=-vv
    healthcheck:
      test: ["CMD-SHELL", "fail2ban-client ping >/dev/null 2>&1 || exit 1"]
      interval: 10m
      timeout: 15s
      retries: 3
      start_period: 90s
    networks:
      - bw_net
    depends_on:
      bw_caddy:
        condition: service_started  # Relaxed - Fail2ban will wait for log files to appear
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        labels: "service=fail2ban"

  bw_ddclient:
    image: lscr.io/linuxserver/ddclient:latest
    container_name: bw_ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./ddclient:/config:rw
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f ddclient >/dev/null || exit 1"]
      interval: 30m
      timeout: 15s
      retries: 2
      start_period: 60s
    networks:
      - bw_net
    environment:
      - PUID=1000
      - PGID=1000
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
        reservations:
          memory: 32M
          cpus: '0.05'
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "2"
        labels: "service=ddclient"

  bw_backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: bitwarden_backup:latest
    container_name: bw_backup
    restart: unless-stopped
    user: "1000:1000"
    env_file:
      - ./settings.env
    volumes:
      - ./data/backups:/backups:rw
      - ./data/backup_logs:/var/log/backup:rw
      - ./backup/rclone.conf:/home/backup/.config/rclone/rclone.conf:ro
    networks:
      - bw_net
    depends_on:
      bw_mariadb:
        condition: service_healthy  # MUST be healthy - backup needs working database
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond >/dev/null && test -w /backups || exit 1"]
      interval: 30m
      timeout: 15s
      retries: 3
      start_period: 120s
    environment:
      - BACKUP_DIR=/backups
      - LOG_DIR=/var/log/backup
      - RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-30}
      - BACKUP_PASSPHRASE=${BACKUP_PASSPHRASE}
      - BACKUP_REMOTE=${BACKUP_REMOTE:-}
      - BACKUP_PATH=${BACKUP_PATH:-vaultwarden-backups}
      - BACKUP_EMAIL=${BACKUP_EMAIL:-}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_DATABASE=${MARIADB_DATABASE}
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    profiles:
      - backup
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
        labels: "service=db-backup"

  bw_watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    container_name: bw_watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE=${WATCHTOWER_SCHEDULE:-0 0 3 * * 0}
      - TZ=${TZ:-UTC}
      - WATCHTOWER_NOTIFICATIONS_LEVEL=info
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_LABEL_ENABLE=true
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - bw_net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
        reservations:
          memory: 64M
          cpus: '0.1'
    logging:
      driver: "json-file"
      options:
        max-size: "25m"
        max-file: "2"
        labels: "service=watchtower"

  bw_logrotate:
    image: alpine:latest
    container_name: bw_logrotate
    restart: unless-stopped
    user: "1000:1000"
    volumes:
      - ./data/caddy_logs:/var/log/caddy:rw
      - ./data/backup_logs:/var/log/backup:rw
      - ./config/logrotate:/etc/logrotate.d:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:rw
    command: >
      sh -c "
      apk add --no-cache logrotate &&
      echo '0 2 * * * /usr/sbin/logrotate -v /etc/logrotate.d/vaultwarden-logs 2>&1' > /var/spool/cron/crontabs/root &&
      crond -f -l 8"
    deploy:
      resources:
        limits:
          memory: 32M
          cpus: '0.1'
        reservations:
          memory: 16M
          cpus: '0.05'
    healthcheck:
      test: ["CMD-SHELL", "pgrep crond >/dev/null || exit 1"]
      interval: 60m
      timeout: 10s
      retries: 2
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"
        labels: "service=logrotate"

networks:
  bw_net:
    driver: bridge
    name: vaultwarden_network
    ipam:
      config:
        - subnet: 172.20.0.0/24
