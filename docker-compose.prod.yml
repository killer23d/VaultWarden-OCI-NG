# docker-compose.prod.yml
version: "3.8"

services:
  vaultwarden:
    image: vaultwarden/server:1.32.6
    container_name: vaultwarden
    restart: unless-stopped
    env_file:
      - ./settings.env
    ports:
      - "8080:80"             # caddy will reverse-proxy; change if you use different mapping
    volumes:
      - ./data/bwdata:/data:rw
    networks:
      - bw_net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80/ || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3

  mariadb:
    image: mariadb:11
    container_name: bw_mariadb
    restart: unless-stopped
    env_file:
      - ./settings.env      # should contain MYSQL_ROOT_PASSWORD / MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD
    volumes:
      - ./data/mariadb:/var/lib/mysql:rw
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD} >/dev/null 2>&1 || mysqladmin ping -h localhost -uroot -p${MYSQL_ROOT_PASSWORD} >/dev/null 2>&1 || exit 1"]
      interval: 1m30s
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  redis:
    image: redis:7
    container_name: bw_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data:rw
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - bw_net

  caddy:
    image: caddy:2
    container_name: bw_caddy
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
      - ./data/caddy_logs:/logs
    ports:
      - "80:80"
      - "443:443"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS --max-time 5 https://localhost || curl -fsS --max-time 5 http://localhost || exit 1"]
      interval: 1m
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  fail2ban:
    image: linuxserver/fail2ban:latest
    container_name: bw_fail2ban
    restart: unless-stopped
    volumes:
      - ./fail2ban/jail.local:/config/jail.local:ro
      - ./fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - /var/log:/var/log:ro
      - ./data/fail2ban:/config:rw
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - PUID=1000
      - PGID=1000
    healthcheck:
      # fail2ban doesn't have a trivial http endpoint; check if 'fail2ban-client ping' works in the container
      test: ["CMD-SHELL", "fail2ban-client ping >/dev/null 2>&1 || exit 1"]
      interval: 2m
      timeout: 10s
      retries: 3
    networks:
      - bw_net

  ddclient:
    image: linuxserver/ddclient:latest
    container_name: bw_ddclient
    restart: unless-stopped
    env_file:
      - ./settings.env
    volumes:
      - ./ddclient/ddclient.conf:/config/ddclient.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "grep -q 'ERROR' /config/ddclient.log 2>/dev/null && exit 1 || exit 0"]
      interval: 5m
      timeout: 10s
      retries: 2
    networks:
      - bw_net

  backup:
    build:
      context: ./backup
      dockerfile: Dockerfile
      # if you prefer using a prebuilt image, change to image: myrepo/bw_backup:1.0
    image: bitwarden_backup:arm64
    container_name: bw_backup
    env_file:
      - ./settings.env
    volumes:
      - ./data/backups:/backups:rw
      - ./data/backup_logs:/var/log/backup:rw
      - ./data/bwdata:/data:ro
      - ./data/mariadb:/var/lib/mysql:ro
    entrypoint: ["/backup/backup.sh"]
    restart: "no"
    networks:
      - bw_net
    healthcheck:
      # backup container is run on cron; simple check: container exists and backup dir is writable
      test: ["CMD-SHELL", "test -w /backups || exit 1"]
      interval: 30m
      timeout: 10s
      retries: 1

networks:
  bw_net:
    driver: bridge
